<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation | Sean Pich & Rin Solin</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Khmer:wght@400;600&display=swap" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Moulpali&family=Moul&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Serif Khmer', serif;
      color: #fff;
    }

    /* =========================
       BACKGROUND CLASS (NEW)
    ========================== */
    .bg-wedding {
      background-image:url('https://C:\Users\Asus\OneDrive\Desktop\Wedding\Image.pich5.jpg'); /* your image */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }

    /* HERO SECTION */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* DARK OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    /* CONTENT */
    .content {
      position: relative;
      z-index: 2;
      max-width: 900px;
      padding: 20px;
    }

    .title {
      font-size: clamp(28px, 6vw, 56px);
      color: #e7c98a;
      margin-bottom: 20px;
      animation: slideLeft 2s ease forwards;
      animation-delay: .5s;
      font-family: "Moulpali", sans-serif;
    }

    .names {
      font-size: clamp(20px, 4.5vw, 36px);
      margin-bottom: 16px;
      animation: slideTop 2s ease forwards;
      animation-delay: .8s;
      font-family: "Moul", serif;
    }

    .subtitle {
      font-size: clamp(14px, 3.5vw, 20px);
      opacity: 0.9;
      margin-bottom: 80px;
      animation: slideTop 1.5s ease forwards;
      animation-delay: 1s;
      font-family: "Moul", serif;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #c9a24d, #e7c98a);
      color: #3a2d12;
      text-decoration: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      transition: 0.4s ease;
      animation: zoomIn 1s ease forwards;
      animation-delay: 1.5s;
      font-family: "Moulpali", sans-serif;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* MOBILE */
    @media (max-width: 480px) {
      .bg-wedding {
        background-position: 55% center;
      }
      .btn {
        padding: 12px 22px;
        font-size: 15px;
      }
    }

    /* ANIMATIONS */
    @keyframes slideLeft {
      0%{
        opacity: 0;
        transform: translateX(100px);
      }
      100%{
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideTop {
      0%{
        opacity: 0;
        transform: translateY(100px);
      }
      100%{
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

  </style>
</head>
<body>

  <!-- Add bg-wedding class here -->
  <section class="hero bg-wedding">
    <div class="overlay"></div>

    <div class="content">
      <h1 class="title">សិរីមង្គលអាពាហ៍ពិពាហ៍</h1>

      <div class="names">ស៊ាន ពេជ &nbsp; ជាគូនឹង &nbsp; រិន សុលីន</div>

      <div class="subtitle">
        ថ្ងៃ សៅរិ៍ ទី ២៨ ខែ មីនា ឆ្នាំ២០២៦<br />
        វេលាម៉ោង ៤:០០ ល្ងាច
      </div>

      <a href="index1.html" class="btn">បើកសំបុត្រអញ្ជើន</a>
    </div>
  </section>

</body>
</html>
