<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Wedding Invitation | Sean Pich & Rin Solin</title>

  <!-- Google Fonts (Khmer-friendly) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Khmer:wght@400;600&display=swap" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Libertinus+Keyboard&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Manufacturing+Consent&family=Moulpali&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Libertinus+Keyboard&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Manufacturing+Consent&family=Moul&family=Moulpali&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&display=swap');
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Serif Khmer', serif;
      background: #f5f2ee;
      color: #fff;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      min-height: 100vh;
      background-image: url('https://images.unsplash.com/photo-1548013146-72479768bada');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      
    }

    /* DARK OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    /* CONTENT */
    .content {
      position: relative;
      z-index: 2;
      max-width: 900px;
      padding: 20px;
      
    }

    .title {
      font-size: clamp(28px, 6vw, 56px);
      font-weight: 600;
      color: #e7c98a;
      margin-bottom: 20px;
      line-height: 1.3;
      animation: slideLeft 2s ease forwards;
      animation-delay: .5s;
      font-family: "Moulpali", sans-serif;
      font-weight: 400;
      font-style: normal;
    }

    .names {
      font-size: clamp(20px, 4.5vw, 36px);
      margin-bottom: 16px;
      animation: slideTop 2s ease forwards;
      animation-delay: .2.1s;
      font-family: "Moul", serif;
      font-weight: 400;
      font-style: normal;

    }

    .subtitle {
      font-size: clamp(14px, 3.5vw, 20px);
      opacity: 0.9;
      margin-bottom: 490px;
      animation: slideTop 1s ease forwards;
      animation-delay: calc(.2s * var(--i));
      font-family: "Moul", serif;
      font-weight: 400;
      font-style: normal;

    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #c9a24d, #e7c98a);
      color: #3a2d12;
      text-decoration: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      transition: 0.4s ease;
      animation: zoomIn 0.8s ease forwards;
      font-family: "Moulpali", sans-serif;
      font-weight: 400;
      font-style: normal;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* MOBILE ADJUSTMENTS */
    @media (max-width: 480px) {
      .hero {
        background-position: 55% center;
      }
      .btn {
        padding: 12px 22px;
        font-size: 15px;
      }
    }
    @keyframes slideLeft {
    0%{
        opacity: 0;
        transform: translateX(100px);
    }
    100%{
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes slideTop {
    0%{
    opacity: 0;
    transform: translateY(100px);
    }
    100%{
    opacity: 1;
    transform: translateY(0);
    }
}

@keyframes zoomIn {
  from {
    opacity: 0;
    transform: scale(0.9);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
@keyframes slideTop {
    0%{
    opacity: 0;
    transform: translateY(100px);
    }
    100%{
    opacity: 1;
    transform: translateY(0);
    }
}

  </style>
</head>
<body>

  <section class="hero">
    <div class="overlay"></div>

    <div class="content">
      <h1 class="title">សិរីមង្គលអាពាហ៍ពិពាហ៍</h1>

      <div class="names">ស៊ាន ពេជ  &nbsp; ជាគូនឹង &nbsp;  រិន សុលីន</div>

      <div class="subtitle">
        ថ្ងៃ សៅរិ៏ ទី ០៤ ខែ មេសា ឆ្នាំ២០២៦<br />
        វេលាម៉ោង ៤:០០ ល្ងាច
      </div>

      <a href="index1.html" class="btn">បើកសំបុត្រអញ្ជើន</a>
    </div>
  </section>

</body>
</html>
